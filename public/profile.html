<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - FitZone Club</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .error {
            color: red;
            background: #ffe0e0;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            color: green;
            background: #e0ffe0;
            padding: 10px;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .logout {
            background: #dc3545;
            margin-left: 10px;
        }
        .logout:hover {
            background: #a71d2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ FitZone Club - Личный кабинет</h1>
        <div id="content">
            <div class="info">Загрузка...</div>
        </div>
        <div>
            <button onclick="checkProfile()">Обновить</button>
            <button class="logout" onclick="logout()">Выйти</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Получить токен из localStorage
        function getToken() {
            return localStorage.getItem('token');
        }

        // Проверить авторизацию и загрузить профиль
        async function checkProfile() {
            const token = getToken();
            
            if (!token) {
                // Нет токена - редирект на страницу входа
                window.location.href = '/auth/login.html';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    // Токен недействителен
                    localStorage.removeItem('token');
                    window.location.href = '/auth/login.html';
                    return;
                }

                const data = await response.json();
                
                if (data.user) {
                    document.getElementById('content').innerHTML = `
                        <div class="success">✅ Вы авторизованы!</div>
                        <div class="info">
                            <strong>ID:</strong> ${data.user.id}<br>
                            <strong>Имя:</strong> ${data.user.name}<br>
                            <strong>Email:</strong> ${data.user.email}<br>
                            <strong>Роль:</strong> ${data.user.role}<br>
                            <strong>Зарегистрирован:</strong> ${new Date(data.user.created_at).toLocaleString()}
                        </div>
                    `;
                } else {
                    document.getElementById('content').innerHTML = `<div class="error">❌ ${data.error || 'Ошибка загрузки профиля'}</div>`;
                }
            } catch (error) {
                document.getElementById('content').innerHTML = `<div class="error">❌ Ошибка: ${error.message}</div>`;
            }
        }

        // Выход
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/auth/login.html';
        }

        // Загрузить профиль при загрузке страницы
        checkProfile();
    </script>
</body>
</html>
