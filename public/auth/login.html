<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - FitZone Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .links {
            margin-top: 25px;
            text-align: center;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #999;
            font-size: 12px;
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: #fee;
            color: #e74c3c;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #e8f5e9;
            color: #4caf50;
            border: 1px solid #c8e6c9;
        }

        .alert-info {
            background: #e3f2fd;
            color: #2196f3;
            border: 1px solid #bbdef5;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            user-select: none;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .checkbox-label input {
            width: auto;
            margin-right: 8px;
        }

        .forgot-link {
            color: #667eea;
            font-size: 14px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ FitZone Club</h1>
        <div class="subtitle">Войдите в свой аккаунт</div>

        <div id="alert" class="alert"></div>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@mail.com" autocomplete="email">
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Введите пароль" autocomplete="current-password">
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe"> Запомнить меня
                </label>
                <a href="#" class="forgot-link" onclick="forgotPassword(event)">Забыли пароль?</a>
            </div>

            <button type="submit" id="submitBtn" onclick="login()">Войти</button>
        </form>

        <div class="divider">
            <span>или</span>
        </div>

        <div class="links">
            <a href="/auth/register.html">📝 Создать аккаунт</a>
            <a href="/">🏠 На главную</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Переключение видимости пароля
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleSpan = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleSpan.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleSpan.textContent = '👁️';
            }
        }

        // Валидация на фронтенде
        function validateForm(email, password) {
            let isValid = true;
            
            // Скрываем все ошибки
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            
            // Валидация email
            if (!email) {
                showError('emailError', 'Введите email');
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('emailError', 'Введите корректный email');
                isValid = false;
            }
            
            // Валидация пароля
            if (!password) {
                showError('passwordError', 'Введите пароль');
                isValid = false;
            } else if (password.length < 6) {
                showError('passwordError', 'Пароль должен быть не менее 6 символов');
                isValid = false;
            }
            
            return isValid;
        }
        
        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }
        
        function showAlert(type, message) {
            const alertEl = document.getElementById('alert');
            alertEl.className = `alert alert-${type} show`;
            alertEl.textContent = message;
            
            setTimeout(() => {
                alertEl.classList.remove('show');
            }, 5000);
        }

        // Основная функция входа
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const submitBtn = document.getElementById('submitBtn');
            
            // Валидация
            if (!validateForm(email, password)) {
                return;
            }
            
            // Блокируем кнопку
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Вход...';
            showAlert('info', 'Проверка данных...');
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Сохраняем токен
                    if (rememberMe) {
                        // На 7 дней
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('rememberMe', 'true');
                    } else {
                        // Только на сессию (sessionStorage)
                        sessionStorage.setItem('token', data.token);
                        localStorage.removeItem('rememberMe');
                    }
                    
                    // Сохраняем данные пользователя
                    if (data.user) {
                        localStorage.setItem('userName', data.user.name);
                        localStorage.setItem('userEmail', data.user.email);
                    }
                    
                    showAlert('success', '✅ Успешный вход! Перенаправление...');
                    
                    // Редирект на профиль или на сохранённую страницу
                    setTimeout(() => {
                        const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || '/profile.html';
                        sessionStorage.removeItem('redirectAfterLogin');
                        window.location.href = redirectUrl;
                    }, 1000);
                } else {
                    // Ошибка входа
                    let errorMessage = data.error || 'Ошибка входа';
                    if (data.errors && data.errors.length > 0) {
                        errorMessage = data.errors.join(', ');
                    }
                    showAlert('error', '❌ ' + errorMessage);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Войти';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('error', '❌ Ошибка подключения к серверу. Убедитесь, что сервер запущен.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Войти';
            }
        }

        // Восстановление пароля (заглушка)
        function forgotPassword(event) {
            event.preventDefault();
            showAlert('info', '📧 Функция восстановления пароля будет доступна позже. Обратитесь к администратору.');
        }

        // Вход по Enter
        document.getElementById('loginForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        // Проверка, был ли сохранён "Запомнить меня"
        if (localStorage.getItem('rememberMe') === 'true' && localStorage.getItem('token')) {
            document.getElementById('rememberMe').checked = true;
        }

        // Если пользователь уже авторизован - редирект на профиль
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        if (token) {
            // Проверяем, не истёк ли токен (опционально)
            window.location.href = '/profile.html';
        }
    </script>
</body>
</html>
